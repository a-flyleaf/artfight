  desc: |-
    A technicolor lizardy-friemd that I’ve had since 2012, and his design has never ever *ever* been perfectly consistent but I have fun with it—and so have other people, with things like [making his dot markings look like **extra eyes**](INC_URL/assets/img/roster/zero-bystarmoths.jpg) (by the lovely [starmoths](https://www.deviantart.com/starmoths)!) and [adding **glowy effects**](https://www.deviantart.com/serosthedragon/art/Gift-for-A-FlyLeaf-878643581). And now I invite y’all to do the same >;3
    
    Doesn’t have much lore but I roleplayed him briefly, and here’s the gist:
    - created in some sort of laboratory for unknown reasons; wholly organic, with no supernatural powers
    - naturally curious, playful, and trusting; skittish in threatening situations
    - basically just wanders around exploring the world, sticking his snout where it doesn’t belong
    - would probably love to meet you(r character/s)!
    - no seriously he’s like horse-sized or bigger he will give rides to the little ones
  perm: |-
